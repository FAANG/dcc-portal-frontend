server {
  listen 8080;

  root   /usr/share/nginx/html;
  index  index.html index.htm;
  include /etc/nginx/mime.types;

  # --- Security headers (applied to every response) ---
  # Prevent MIME-type sniffing.
  add_header X-Content-Type-Options "nosniff" always;
  # Clickjacking protection: only this origin may frame the app.
  add_header X-Frame-Options "SAMEORIGIN" always;
  # Limit referrer leakage to cross-origin destinations.
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Drop access to powerful browser features the app does not use.
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

  # Content-Security-Policy.
  # NOTE: 'unsafe-inline'/'unsafe-eval' are required by the current bundle
  # (Angular Material inline styles, swagger-ui 3.x, igv, chart.js) and weaken
  # script protection. Tighten with nonces/hashes after the swagger-ui and
  # flex-layout migrations. frame-src must list the external validator iframe origin.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-src 'self' https://faang-validator-frontend-341387543760.europe-west2.run.app; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

  location / {
      try_files $uri $uri/ /index.html;
  }
}
